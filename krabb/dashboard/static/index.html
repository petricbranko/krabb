<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>krabb — dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>krabb</h1>
      <span class="status" id="status">connecting...</span>
    </header>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="label">Events today</div>
        <div class="value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Blocked today</div>
        <div class="value" id="stat-blocked">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Top domain</div>
        <div class="value" id="stat-domain" style="font-size:14px">—</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span>Blocklist</span>
      </div>
      <div class="allowlist-form">
        <input type="text" id="pattern-input" placeholder="example.com, *.github.com, or /regex/">
        <button class="btn-primary" onclick="addPattern()">Add</button>
      </div>
      <div id="allowlist-list"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span>Recent events</span>
        <span class="status" id="event-count"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Tool</th>
            <th>Input</th>
            <th>Decision</th>
          </tr>
        </thead>
        <tbody id="events-body">
          <tr><td colspan="4" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API = "http://127.0.0.1:4243";

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function truncate(str, len) {
      if (!str) return "";
      return str.length > len ? str.slice(0, len) + "..." : str;
    }

    function formatTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function summarizeInput(tool, input) {
      try {
        const obj = typeof input === "string" ? JSON.parse(input) : input;
        if (tool === "WebFetch") return obj.url || "";
        if (tool === "WebSearch") return obj.query || "";
        if (tool === "Bash") return obj.command || "";
        if (tool === "Read" || tool === "Write") return obj.file_path || "";
        return JSON.stringify(obj);
      } catch {
        return String(input);
      }
    }

    async function fetchEvents() {
      try {
        const res = await fetch(API + "/events?limit=100");
        const data = await res.json();
        const tbody = document.getElementById("events-body");
        const events = data.events || [];

        document.getElementById("event-count").textContent = events.length + " shown";

        if (events.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">No events yet</td></tr>';
          return;
        }

        tbody.innerHTML = events.map(e => {
          const badge = e.decision === "allow"
            ? '<span class="badge badge-allow">allow</span>'
            : '<span class="badge badge-deny">deny</span>';
          const summary = escapeHtml(truncate(summarizeInput(e.tool, e.input), 60));
          return `<tr>
            <td>${escapeHtml(formatTime(e.ts))}</td>
            <td>${escapeHtml(e.tool)}</td>
            <td class="input-truncated" title="${escapeHtml(summarizeInput(e.tool, e.input))}">${summary}</td>
            <td>${badge}</td>
          </tr>`;
        }).join("");

        document.getElementById("status").textContent = "live";
      } catch {
        document.getElementById("status").textContent = "hook offline";
      }
    }

    async function fetchStats() {
      try {
        const res = await fetch(API + "/stats");
        const data = await res.json();
        document.getElementById("stat-total").textContent = data.total_today ?? "—";
        document.getElementById("stat-blocked").textContent = data.blocked_today ?? "—";
        document.getElementById("stat-domain").textContent = data.top_domain || "—";
      } catch {
        // ignore — stats are optional
      }
    }

    async function fetchBlocklist() {
      try {
        const res = await fetch(API + "/blocklist");
        const data = await res.json();
        const container = document.getElementById("allowlist-list");
        const patterns = data.patterns || [];

        if (patterns.length === 0) {
          container.innerHTML = '<div class="empty">No patterns — nothing blocked</div>';
          return;
        }

        container.innerHTML = patterns.map(p =>
          `<div class="allowlist-item">
            <code>${escapeHtml(p)}</code>
            <button class="btn-danger" onclick="removePattern('${escapeHtml(p)}')">Remove</button>
          </div>`
        ).join("");
      } catch {
        // ignore
      }
    }

    async function addPattern() {
      const input = document.getElementById("pattern-input");
      const pattern = input.value.trim();
      if (!pattern) return;

      try {
        await fetch(API + "/blocklist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pattern }),
        });
        input.value = "";
        fetchBlocklist();
      } catch {
        alert("Failed to add pattern — is the hook server running?");
      }
    }

    async function removePattern(pattern) {
      try {
        await fetch(API + "/blocklist", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pattern }),
        });
        fetchBlocklist();
      } catch {
        alert("Failed to remove pattern — is the hook server running?");
      }
    }

    // Allow Enter key in pattern input
    document.getElementById("pattern-input").addEventListener("keydown", e => {
      if (e.key === "Enter") addPattern();
    });

    // Initial fetch
    fetchEvents();
    fetchStats();
    fetchBlocklist();

    // Auto-refresh
    setInterval(fetchEvents, 3000);
    setInterval(fetchStats, 5000);
    setInterval(fetchBlocklist, 10000);
  </script>
</body>
</html>
